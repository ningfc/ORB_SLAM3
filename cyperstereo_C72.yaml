%YAML:1.0

#--------------------------------------------------------------------------------------------
# Camera Parameters. Adjust them!
#--------------------------------------------------------------------------------------------

Camera.type: "KannalaBrandt8"

# Left Camera calibration and distortion parameters (OpenCV)
Camera.fx: 235.08240978101622
Camera.fy: 234.9308933044213
Camera.cx: 390.1132090148123
Camera.cy: 261.0598094420082

# Kannala-Brandt distortion parameters
Camera.k1: 0.09402850680775149
Camera.k2: 0.03305407183722046
Camera.k3: -0.005546318820237032
Camera.k4: -0.010313317689710444

# Right Camera calibration and distortion parameters (OpenCV)
Camera2.fx: 234.2023906504201
Camera2.fy: 234.08677412373225
Camera2.cx: 381.652229645341
Camera2.cy: 254.54013142215027

# Kannala-Brandt distortion parameters
Camera2.k1: 0.09791248113784967
Camera2.k2: 0.03337723462323392
Camera2.k3: -0.016331254879885074
Camera2.k4: -0.001173560752032311
    
# Transformation matrix from right camera to left camera
Tlr: !!opencv-matrix
  rows: 3
  cols: 4
  dt: f
  data: [ 0.99999721, 0.00197429, -0.00129438, 0.150023,
          -0.00196439, 0.99996916, 0.00760402, 0.00235858,
          0.00130936, -0.00760145, 0.99997025, 0.00025564]

# Lapping area between images  HAN
Camera.lappingBegin: 0  
Camera.lappingEnd: 751

Camera2.lappingBegin: 0
Camera2.lappingEnd: 751

# Camera resolution
Camera.width: 752
Camera.height: 480

# Camera frames per second 
Camera.fps: 26.0

# Color order of the images (0: BGR, 1: RGB. It is ignored if images are grayscale)
Camera.RGB: 1

# Close/Far threshold. Baseline times.   HAN
ThDepth: 40.0
Camera.bf: 35.146808728


# Transformation from body-frame (imu) to left camera
Tbc: !!opencv-matrix
   rows: 4
   cols: 4
   dt: f
   data: [-0.99999231, -0.00187517, -0.00344396, 0.13822489,
           0.0018755, -0.99999824, -0.00009357, -0.00072575,
           -0.00344378, -0.00010003, 0.99999407, 0.0177429,
           0, 0, 0, 1.]

# IMU noise (Use those from VINS-mono)   HAN
IMU.NoiseGyro: 0.03 # 0.004 (VINS) # 0.00016 (TUM) # 0.00016    # rad/s^0.5 
IMU.NoiseAcc: 0.3  # 0.04 (VINS) # 0.0028 (TUM) # 0.0028     # m/s^1.5
IMU.GyroWalk: 0.000022 # 0.000022 (VINS and TUM) rad/s^1.5
IMU.AccWalk: 0.0004 # 0.0004 (VINS) # 0.00086 # 0.00086    # m/s^2.5
IMU.Frequency: 200
#thFarPoints: 20.0
#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------

# ORB Extractor: Number of features per image   HAN
ORBextractor.nFeatures: 1500 # Tested with 1250

# ORB Extractor: Scale factor between levels in the scale pyramid 	
ORBextractor.scaleFactor: 1.2

# ORB Extractor: Number of levels in the scale pyramid	
ORBextractor.nLevels: 8

# ORB Extractor: Fast threshold
# Image is divided in a grid. At each cell FAST are extracted imposing a minimum response.
# Firstly we impose iniThFAST. If no corners are detected we impose a lower value minThFAST
# You can lower these values if your images have low contrast	  HAN		
ORBextractor.iniThFAST: 12 # 20
ORBextractor.minThFAST: 5 # 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3
Viewer.ViewpointX: 0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -3.5
Viewer.ViewpointF: 500
